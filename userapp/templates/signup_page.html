<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif; padding: 2rem 0;
    }
    .signup-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
    }
    .signup-icon {
      width: 56px; height: 56px; background: #eff6ff; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
    }
    .signup-icon i { font-size: 1.75rem; color: #2563eb; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #1e293b; text-align: center; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.875rem; margin-bottom: 1.75rem; }
    .form-label { font-size: 0.875rem; font-weight: 500; color: #374151; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e2e8f0;
      padding: 0.6rem 0.85rem; font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-signup {
      width: 100%; padding: 0.65rem; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-signup:hover { background: #1d4ed8; }
    .login-link { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #64748b; }
    .login-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="signup-card">
    <div class="signup-icon"><i class="bi bi-person-plus-fill"></i></div>
    <h1>Create account</h1>
    <p class="subtitle">Register to manage your institution</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Institution Name</label>
        <input type="text" class="form-control" name="name" placeholder="Enter institution name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" placeholder="your@email.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn-signup">Create Account</button>
    </form>

    <p class="login-link">Already have an account? <a href="{% url 'loginpage' %}">Log in</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
