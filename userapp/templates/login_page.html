<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .login-icon {
      width: 56px; height: 56px; background: #eff6ff;
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.25rem;
    }
    .login-icon i { font-size: 1.75rem; color: #2563eb; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #1e293b; text-align: center; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.875rem; margin-bottom: 1.75rem; }
    .form-label { font-size: 0.875rem; font-weight: 500; color: #374151; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e2e8f0;
      padding: 0.6rem 0.85rem; font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
    .btn-login {
      width: 100%; padding: 0.65rem; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .signup-link { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #64748b; }
    .signup-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .signup-link a:hover { text-decoration: underline; }
    .input-group-text {
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-right: none; color: #94a3b8;
    }
    .input-group .form-control { border-left: none; }
    .input-group .form-control:focus { border-left: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to Student Management System</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <p class="signup-link">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
