{% extends 'home.html' %}
{% block title %}Add Student{% endblock %}
{% block nav_add %}active{% endblock %}

{% block body %}
<div class="page-header">
  <h2>Add Student</h2>
  <p>Fill in all details to enrol a new student</p>
</div>

<div class="card" style="max-width:780px;">
  <div class="card-header"><i class="bi bi-person-plus me-2"></i>Student Details</div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-500">Full Name <span class="req">*</span></label>
          <input type="text" class="form-control" name="name" placeholder="Enter full name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Course <span class="req">*</span></label>
          <input type="text" class="form-control" name="course" placeholder="e.g. Computer Science" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Age <span class="req">*</span></label>
          <input type="number" class="form-control" name="age" placeholder="Age" min="1" max="100" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Date of Birth <span class="req">*</span></label>
          <input type="date" class="form-control" name="dob" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Date of Joining <span class="req">*</span></label>
          <input type="date" class="form-control" name="doj" required>
        </div>

        <!-- Country -->
        <div class="col-md-6">
          <label class="form-label fw-500">Country <span class="req">*</span></label>
          <select class="form-select" name="country" id="countrySelect" required>
            <option value="">Select Country</option>
          </select>
        </div>

        <!-- State — depends on country -->
        <div class="col-md-6">
          <label class="form-label fw-500">State <span class="req">*</span></label>
          <select class="form-select" name="state" id="stateSelect" required>
            <option value="">Select State</option>
          </select>
        </div>

        <!-- City -->
        <div class="col-md-6">
          <label class="form-label fw-500">City <span class="req">*</span></label>
          <input type="text" class="form-control" name="city" placeholder="Enter city" required>
        </div>

        <div class="col-12">
          <label class="form-label fw-500">Address <span class="req">*</span></label>
          <textarea class="form-control" name="address" rows="3" placeholder="Enter full address" required></textarea>
        </div>

      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-person-check me-1"></i>Save Student
        </button>
        <a href="{% url 'students_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // Country → State dynamic dropdowns using CountriesNow API
  const countrySelect = document.getElementById('countrySelect');
  const stateSelect   = document.getElementById('stateSelect');

  // Load all countries on page load
  fetch('https://countriesnow.space/api/v0.1/countries/states')
    .then(r => r.json())
    .then(data => {
      if (data.error) return;
      const countries = data.data.sort((a, b) => a.name.localeCompare(b.name));
      countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name;
        opt.textContent = c.name;
        countrySelect.appendChild(opt);
      });
      window._countriesData = countries;
    })
    .catch(() => {
      const opt = document.createElement('option');
      opt.textContent = 'Failed to load countries';
      countrySelect.appendChild(opt);
    });

  // When country changes, populate states
  countrySelect.addEventListener('change', function () {
    stateSelect.innerHTML = '<option value="">Select State</option>';
    const selected = this.value;
    if (!selected || !window._countriesData) return;

    const country = window._countriesData.find(c => c.name === selected);
    if (country && country.states && country.states.length > 0) {
      country.states.sort((a, b) => a.name.localeCompare(b.name)).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        stateSelect.appendChild(opt);
      });
    } else {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No states available';
      stateSelect.appendChild(opt);
    }
  });
</script>
{% endblock %}
